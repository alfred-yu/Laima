version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: laima-postgres
    environment:
      POSTGRES_DB: laima
      POSTGRES_USER: laima
      POSTGRES_PASSWORD: laima123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laima -d laima"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: laima-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: laima-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: laima_master_key
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: laima-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: laima
      MINIO_ROOT_PASSWORD: laima123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: laima-backend
    ports:
      - "8080:8080"
    environment:
      - LAIMA_DB_HOST=postgres
      - LAIMA_DB_PORT=5432
      - LAIMA_DB_NAME=laima
      - LAIMA_DB_USER=laima
      - LAIMA_DB_PASSWORD=laima123
      - LAIMA_REDIS_URL=redis://redis:6379
      - LAIMA_MINIO_ENDPOINT=minio:9000
      - LAIMA_MINIO_ACCESS_KEY=laima
      - LAIMA_MINIO_SECRET_KEY=laima123
      - LAIMA_MINIO_USE_SSL=false
      - LAIMA_MEILISEARCH_URL=http://meilisearch:7700
      - LAIMA_MEILISEARCH_API_KEY=laima_master_key
      - LAIMA_REPO_PATH=/app/repos
      - GIN_MODE=release
    volumes:
      - ./repos:/app/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build: ../frontend
    container_name: laima-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data: